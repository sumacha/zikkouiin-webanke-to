<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月影祭アンケート</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#0c1026,#141a3a);
color:white;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:20px;
text-align:center;
}

h2{
font-size:16px;
margin:25px 0 15px;
}

.choices{
display:flex;
justify-content:center;
gap:10px;
}

.choice{
cursor:pointer;
width:110px;
}

.choice img{
width:100%;
border-radius:12px;
}

textarea{
width:100%;
height:160px;
padding:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6a7cff,#8f9cff);
color:white;
font-size:16px;
cursor:pointer;
}

.error{
color:#ff6b6b;
font-size:13px;
margin-top:6px;
text-align:left;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>分掌を選んでください</h2>

<div class="choices">

<div class="choice" data-value="全体運営"
data-off="https://i.imgur.com/SB5uYuu.png"
data-on="https://i.imgur.com/0M6Yvmx.png">
<img src="https://i.imgur.com/SB5uYuu.png">
</div>

<div class="choice" data-value="講堂企画"
data-off="https://i.imgur.com/YZctYtx.png"
data-on="https://i.imgur.com/Qf9Vvxk.png">
<img src="https://i.imgur.com/YZctYtx.png">
</div>

<div class="choice" data-value="セレモニー・広報"
data-off="https://i.imgur.com/KvbO4N5.png"
data-on="https://i.imgur.com/7PWkgwT.png">
<img src="https://i.imgur.com/KvbO4N5.png">
</div>

</div>

<div id="errorChoice" class="error">
分掌を選択してください
</div>

<h2>
実施する企画と説明（時間や順番、内容など決まっているもの）を記入してください
</h2>

<textarea id="content"></textarea>

<div id="errorText" class="error">
企画内容を入力してください
</div>

<form id="form"
action="https://script.google.com/macros/s/AKfycbwQG3IInMD9RE4VH8meyFC-joQnEWpPJFknE9VejMbrrLXTzj7pDrAvfS2BrBoHqfwbdw/exec"
method="POST"
target="hidden_iframe">

<input type="hidden" name="department" id="department">
<input type="hidden" name="content" id="content_hidden">

<button type="submit">提出</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
let selected="全体運営";
const choices=document.querySelectorAll(".choice");

choices[0].querySelector("img").src=choices[0].dataset.on;

choices.forEach(el=>{
el.onclick=()=>{
choices.forEach(e=>{
e.querySelector("img").src=e.dataset.off;
});
el.querySelector("img").src=el.dataset.on;
selected=el.dataset.value;

document.getElementById("errorChoice").style.display="none";
};
});

document.getElementById("content").addEventListener("input",()=>{
document.getElementById("errorText").style.display="none";
});

document.getElementById("form").onsubmit=(e)=>{

let valid=true;

const text=document.getElementById("content").value.trim();

if(!selected){
document.getElementById("errorChoice").style.display="block";
valid=false;
}

if(!text){
document.getElementById("errorText").style.display="block";
valid=false;
}

if(!valid){
e.preventDefault();
return;
}

document.getElementById("department").value=selected;
document.getElementById("content_hidden").value=text;

// 送信後遷移
setTimeout(()=>{
window.location.href="thanks.html";
},300);

};
</script>

</body>
</html>
